<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" data-theme="light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 4</title>
    <!-- tailwind & daisy Ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="text-gray-800 bg-[#F8FAFC]">
    <div class="max-w-[1110px] mx-auto py-10 px-4">
        <!-- Title -->
        <h2 class="text-3xl font-bold mb-8">Job Application Tracker</h2>
        <!--Application cards -->
        <div class="grid md:grid-cols-3 mb-8 gap-6">
            <div class="bg-white rounded-lg p-6 shadow-sm border-[#F1F2F4]">
                <p class="text-[#323B49]">Total</p>
                <h2 class="text-2xl text-[#002C5C] font-bold mt-5">0</h2>
            </div>

            <div class="bg-white rounded-lg p-6 shadow-sm border-[#F1F2F4]">
                <p class="text-[#323B49]">Total</p>
                <h2 class="text-2xl text-[#10B981] font-bold mt-5">0</h2>
            </div>

            <div class="bg-white rounded-lg p-6 shadow-sm border-[#F1F2F4]">
                <p class="text-[#323B49]">Total</p>
                <h2 class="text-2xl text-[#EF4444] font-bold mt-5">0</h2>
            </div>

        </div>
        <hr class="text-[#E6E7E9]">
    </div>

    <!-- Available Jobs -->
     <div class="max-w-[1110px] mx-auto">
        <div class="flex justify-between items-center w-full">
            <h2 class="text-xl font-semibold tex-[#002C5C] ">Available Jobs</h2>
            <p> <span id="jobs-count">8 </span>jobs</p>
        </div>
        <div class="flex gap-5 mt-5">
            <button id="all" class="bg-[#3B82F6] text-white rounded-md px-8 py-2">All</button>
            <button id="interview" class="">Interview</button>
            <button id="Rejected" class="">Rejected</button>
        </div>

     </div>
    
</body>
</html>
